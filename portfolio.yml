name: Portfolio Analyzer

on:
  # Run automatically every day at 8:30 AM Eastern
  schedule:
    - cron: '30 13 * * 1-5'   # 1:30 PM UTC = 8:30 AM ET (weekdays only)

  # Also allow manual trigger from GitHub website
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run portfolio analyzer
        env:
          RH_USERNAME:        ${{ secrets.RH_USERNAME }}
          RH_PASSWORD:        ${{ secrets.RH_PASSWORD }}
          FINNHUB_API_KEY:    ${{ secrets.FINNHUB_API_KEY }}
          TAX_FILING_STATUS:  ${{ secrets.TAX_FILING_STATUS }}
          TAX_TAXABLE_INCOME: ${{ secrets.TAX_TAXABLE_INCOME }}
          TAX_STATE_RATE:     ${{ secrets.TAX_STATE_RATE }}
          TAX_APPLY_NIIT:     ${{ secrets.TAX_APPLY_NIIT }}
          SEC_USER_AGENT:     ${{ secrets.SEC_USER_AGENT }}
        run: |
          python analyze_portfolio.py \
            --source robinhood \
            --include-watchlists \
            --save-positions positions.csv \
            --out report.html

      - name: Prepare Pages output
        run: |
          mkdir -p _site
          cp report.html _site/index.html
          # Add a small "last updated" stamp
          echo "<!-- Generated: $(date -u) -->" >> _site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: analyze
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4